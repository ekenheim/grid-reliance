# KubeRay RayJob: distributed HSGP inference (Silver → Gold).
#
# Each MCMC chain runs as an independent ray.remote task on a separate worker
# in the existing ray-kuberay cluster. The submitter pod connects to the cluster
# via ray.init(address="auto") and dispatches N_CHAINS tasks.
#
# Pre-requisites:
#   - ray-kuberay cluster running in datasci namespace
#   - grid-resilience-inference image published to GHCR (submitter pod)
#   - grid-resilience-ray-worker image published to GHCR (Ray worker pods)
#     Platform team: point the Ray HelmRelease at the worker image:
#       workerGroupSpecs[0].template.spec.containers[0].image:
#         ghcr.io/ekenheim/grid-resilience-ray-worker:latest
#   - Silver bucket has silver/grid_snapshots.parquet (written by Spark ingest)
#   - Gold OBC secret/configmap grid-resilience-gold provisioned
#   - Silver OBC secret/configmap grid-resilience-silver provisioned
---
apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: grid-resilience-bayesian-inference
  namespace: datasci
spec:
  clusterSelector:
    ray.io/cluster: ray-kuberay
  entrypoint: python -m inference.run_inference
  submitterPodTemplate:
    spec:
      restartPolicy: Never
      containers:
        - name: submitter
          image: ghcr.io/ekenheim/grid-resilience-inference:latest
          imagePullPolicy: Always
          # Gold (write): primary envFrom
          envFrom:
            - secretRef:
                name: grid-resilience-gold
            - configMapRef:
                name: grid-resilience-gold
          env:
            # Silver (read): explicit SILVER_ prefix to avoid collision with Gold vars
            - name: SILVER_AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: grid-resilience-silver
                  key: AWS_ACCESS_KEY_ID
            - name: SILVER_AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: grid-resilience-silver
                  key: AWS_SECRET_ACCESS_KEY
            - name: SILVER_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: grid-resilience-silver
                  key: BUCKET_NAME
            - name: SILVER_BUCKET_HOST
              valueFrom:
                configMapKeyRef:
                  name: grid-resilience-silver
                  key: BUCKET_HOST
            - name: SILVER_BUCKET_PORT
              valueFrom:
                configMapKeyRef:
                  name: grid-resilience-silver
                  key: BUCKET_PORT
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1"
