name: Release (all images, lockstep)

# Tag-driven release. A push of v* (or a manual workflow_dispatch with a tag
# ref) builds EVERY service image at the same version, so v1.0.N always
# means all six images exist on GHCR.
#
# Per-service workflows (api.yml, pipeline.yml, …) still handle main-branch
# pushes with path filters — those produce :latest / :<sha> images for devs.
# Tag builds are owned exclusively by this workflow.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to rebuild all images for (e.g. v1.0.17)"
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: pipeline
            dockerfile: ./pipeline/Dockerfile
          - name: api
            dockerfile: ./api/Dockerfile
          - name: generator
            dockerfile: ./generator/Dockerfile
          - name: data-engineering
            dockerfile: ./data-engineering/Dockerfile
          - name: inference
            dockerfile: ./inference/Dockerfile
          - name: ray-worker
            dockerfile: ./ray-worker/Dockerfile
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${GITHUB_REF}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Get version
        id: version
        run: |
          REF="${{ steps.ref.outputs.ref }}"
          # Accepts refs/tags/vX.Y.Z or a bare vX.Y.Z input
          VERSION="${REF#refs/tags/v}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/grid-resilience-${{ matrix.service.name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=v${{ steps.version.outputs.version }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
