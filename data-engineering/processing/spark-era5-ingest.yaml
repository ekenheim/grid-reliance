# SparkApplication: ERA5 NetCDF → Silver grid_snapshots.parquet
# Spark Operator (sparkoperator.k8s.io/v1beta2) in the datasci namespace.
#
# Bronze (read)  credentials injected via OBC secret/configmap grid-resilience-bronze.
# Silver (write) credentials injected via OBC secret/configmap grid-resilience-silver.
#
# Trigger manually or wire into a Dagster sensor / Argo Workflow after
# fetch_era5_nordic.py --upload-bronze completes.
---
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: grid-resilience-era5-ingest
  namespace: datasci
spec:
  type: Python
  mode: cluster
  pythonVersion: "3"
  mainApplicationFile: local:///opt/spark/job/spark_era5_ingest.py
  image: ghcr.io/ekenheim/grid-resilience-data-engineering:latest
  imagePullPolicy: Always
  sparkVersion: "4.0.2"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 2
    onFailureRetryInterval: 60
  driver:
    cores: 1
    coreLimit: "1200m"
    memory: "2Gi"
    serviceAccount: default
    # Silver (write): primary envFrom so BUCKET_HOST / AWS_* resolve to Silver OBC
    envFrom:
      - secretRef:
          name: grid-resilience-silver
      - configMapRef:
          name: grid-resilience-silver
    env:
      # Bronze (read): explicit prefixed vars so both buckets are unambiguous
      - name: BRONZE_BUCKET_HOST
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-bronze
            key: BUCKET_HOST
      - name: BRONZE_BUCKET_PORT
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-bronze
            key: BUCKET_PORT
      - name: BRONZE_BUCKET_NAME
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-bronze
            key: BUCKET_NAME
      - name: BRONZE_AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: grid-resilience-bronze
            key: AWS_ACCESS_KEY_ID
      - name: BRONZE_AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: grid-resilience-bronze
            key: AWS_SECRET_ACCESS_KEY
  executor:
    cores: 2
    memory: "4Gi"
    instances: 2
    envFrom:
      - secretRef:
          name: grid-resilience-silver
      - configMapRef:
          name: grid-resilience-silver
    env:
      - name: BRONZE_BUCKET_HOST
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-bronze
            key: BUCKET_HOST
      - name: BRONZE_BUCKET_PORT
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-bronze
            key: BUCKET_PORT
      - name: BRONZE_BUCKET_NAME
        valueFrom:
          configMapKeyRef:
            name: grid-resilience-bronze
            key: BUCKET_NAME
      - name: BRONZE_AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: grid-resilience-bronze
            key: AWS_ACCESS_KEY_ID
      - name: BRONZE_AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: grid-resilience-bronze
            key: AWS_SECRET_ACCESS_KEY
